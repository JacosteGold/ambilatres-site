<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Article - AMBILATRES</title>
    <link href="https://fonts.googleapis.com/css2?family=Darker+Grotesque:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">
    <link rel="icon" type="image/png" href="Dubreuil services (1).png">
    <style>
        :root {
            --void: #080808;
            --power: #ffffff;
            --accent: #333333;
            --accent-light: #666666;
            --border: rgba(255, 255, 255, 0.1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Darker Grotesque', sans-serif;
            background: var(--void);
            color: var(--power);
            min-height: 100vh;
            overflow-x: hidden;
        }

        canvas#matrix {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            opacity: 0.07;
            pointer-events: none;
            filter: blur(0.5px);
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
            padding: 0 1.5rem;
            position: relative;
            z-index: 1;
        }

        header {
            border-bottom: 1px solid var(--accent);
            background: rgba(8, 8, 8, 0.8);
            backdrop-filter: blur(10px);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0.5rem 0;
            border-bottom: 1px solid var(--border);
            font-size: 0.8rem;
            letter-spacing: 0.1em;
            color: var(--accent-light);
        }

        .top-bar a {
            color: var(--accent-light);
            text-decoration: none;
            margin-left: 1rem;
            transition: color 0.3s;
        }

        .top-bar a:hover {
            color: var(--power);
        }

        .main-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 1rem 0;
        }

        .logo {
            font-size: 2rem;
            font-weight: 300;
            letter-spacing: 0.3em;
            text-decoration: none;
            color: var(--power);
            text-transform: uppercase;
        }

        nav {
            display: flex;
            gap: 1.5rem;
        }

        nav a {
            color: var(--power);
            text-decoration: none;
            font-size: 1rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            position: relative;
        }

        nav a::after {
            content: '';
            position: absolute;
            bottom: -5px;
            left: 0;
            width: 0;
            height: 1px;
            background: var(--power);
            transition: width 0.3s;
        }

        nav a:hover::after {
            width: 100%;
        }

        .article-container {
            padding: 3rem 0;
            min-height: 60vh;
        }

        .article-meta {
            font-size: 0.8rem;
            color: var(--accent-light);
            text-transform: uppercase;
            letter-spacing: 0.2em;
            margin-bottom: 1rem;
            display: flex;
            align-items: center;
            gap: 1rem;
        }

        .live-badge {
            background: #cc0000;
            color: white;
            padding: 0.1rem 0.4rem;
            font-size: 0.7rem;
            font-weight: bold;
            border-radius: 2px;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {

            0%,
            100% {
                opacity: 1;
            }

            50% {
                opacity: 0.5;
            }
        }

        .article-title {
            font-size: 3rem;
            font-weight: 300;
            line-height: 1.1;
            margin-bottom: 1.5rem;
            letter-spacing: -0.02em;
        }

        .article-author {
            font-size: 0.9rem;
            color: var(--accent-light);
            margin-bottom: 2rem;
        }

        .article-content {
            font-size: 1.1rem;
            line-height: 1.8;
            color: #ccc;
        }

        .article-content p {
            margin-bottom: 1.5rem;
        }

        .article-content h2 {
            font-size: 2rem;
            font-weight: 400;
            margin: 2rem 0 1rem;
            color: var(--power);
        }

        .article-content h3 {
            font-size: 1.5rem;
            font-weight: 400;
            margin: 1.5rem 0 1rem;
            color: var(--power);
        }

        .loading {
            text-align: center;
            padding: 4rem 0;
            font-size: 1.2rem;
            color: var(--accent-light);
        }

        .error {
            text-align: center;
            padding: 4rem 0;
        }

        .error h2 {
            font-size: 2rem;
            margin-bottom: 1rem;
            color: #cc0000;
        }

        .error p {
            color: var(--accent-light);
            margin-bottom: 2rem;
        }

        .error a {
            color: var(--power);
            text-decoration: none;
            padding: 0.75rem 1.5rem;
            border: 1px solid var(--power);
            display: inline-block;
            transition: background 0.3s;
        }

        .error a:hover {
            background: var(--power);
            color: var(--void);
        }

        footer {
            border-top: 1px solid var(--accent);
            padding: 3rem 0;
            background: rgba(8, 8, 8, 0.9);
            margin-top: 4rem;
        }

        .footer-content {
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
        }

        .footer-links a {
            color: var(--accent-light);
            text-decoration: none;
            margin-right: 1.5rem;
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            transition: color 0.3s;
        }

        .footer-links a:hover {
            color: var(--power);
        }

        .coords {
            font-size: 0.7rem;
            color: var(--accent);
            font-family: monospace;
        }

        @media (max-width: 768px) {
            .article-title {
                font-size: 2rem;
            }

            .main-header {
                flex-direction: column;
                gap: 1rem;
            }

            nav {
                flex-wrap: wrap;
                justify-content: center;
                gap: 1rem;
            }
        }
    </style>
</head>

<body>

    <header>
        <div class="container">
            <div class="top-bar">
                <div class="date" id="currentDate"></div>
                <div class="top-links">
                    <a href="subscribe/index.html">Subscribe</a>
                    <a href="login/loginpage.html">Login</a>
                </div>
            </div>
            <div class="main-header">
                <a href="index.html" class="logo">AMBILATRES</a>
                <nav>
                    <a href="latest/index.html">Latest</a>
                    <a href="business/index.html">Business</a>
                    <a href="technology/index.html">Technology</a>
                    <a href="politics/index.html">Politics</a>
                    <a href="culture/index.html">Culture</a>
                    <a href="science/index.html">Science</a>
                </nav>
            </div>
        </div>
    </header>

    <div class="container">
        <article class="article-container" id="articleContainer">
            <div class="loading">Loading article...</div>
        </article>
    </div>

    <footer>
        <div class="container">
            <div class="footer-content">
                <div class="footer-links">
                    <a href="mailto:contact@ambilatres.com">Contact</a>
                    <a href="about/index.html">About Us</a>
                    <a href="privacy/index.html">Privacy Policy</a>
                    <a href="terms/index.html">Terms</a>
                </div>
                <div class="coords">22°17'56"N 114°10'20"E</div>
            </div>
        </div>
    </footer>

    <script src="js/firebase-config.js"></script>
    <script src="js/api-client.js"></script>
    <script>
        // Set current date
        function setCurrentDate() {
            const dateElement = document.getElementById('currentDate');
            const now = new Date();
            const options = { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' };
            const formattedDate = now.toLocaleDateString('en-US', options);
            dateElement.textContent = formattedDate;
        }
        setCurrentDate();

        // Matrix background animation
        const canvas = document.getElementById('matrix');
        const ctx = canvas.getContext('2d');
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
        const chars = '杜脱脱喜欢小咪咪';
        const fontSize = 14;
        const columns = canvas.width / fontSize;
        const drops = new Array(Math.floor(columns)).fill(1);

        function draw() {
            ctx.fillStyle = 'rgba(8, 8, 8, 0.05)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = '#222';
            ctx.font = `${fontSize}px "PingFang SC", "Microsoft YaHei", monospace`;
            for (let i = 0; i < drops.length; i++) {
                const text = chars[Math.floor(Math.random() * chars.length)];
                ctx.fillText(text, i * fontSize, drops[i] * fontSize);
                if (drops[i] * fontSize > canvas.height && Math.random() > 0.95)
                    drops[i] = 0;
                drops[i]++;
            }
        }
        setInterval(draw, 25);
        window.addEventListener('resize', () => {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        });

    </script>
</body>

</html>
