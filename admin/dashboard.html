<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tableau de bord - AMBILATRES</title>
    <link href="https://fonts.googleapis.com/css2?family=Darker+Grotesque:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">
    <link rel="icon" type="image/png" href="../Dubreuil services (1).png">
    <style>
        :root {
            --void: #080808;
            --power: #ffffff;
            --accent: #333333;
            --accent-light: #666666;
            --border: rgba(255, 255, 255, 0.1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Darker Grotesque', sans-serif;
            background: var(--void);
            color: var(--power);
            min-height: 100vh;
        }

        canvas#matrix {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            opacity: 0.07;
            pointer-events: none;
            filter: blur(0.5px);
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 2rem 1.5rem;
            position: relative;
            z-index: 1;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2rem;
            padding-bottom: 1rem;
            border-bottom: 1px solid var(--border);
        }

        .header h1 {
            font-size: 2rem;
            font-weight: 300;
            letter-spacing: 0.2em;
            text-transform: uppercase;
        }

        .header-actions {
            display: flex;
            gap: 1rem;
            align-items: center;
        }

        .user-info {
            font-size: 0.9rem;
            color: var(--accent-light);
            letter-spacing: 0.1em;
        }

        button,
        .btn {
            padding: 0.75rem 1.5rem;
            background: var(--power);
            color: var(--void);
            border: none;
            font-family: inherit;
            font-size: 0.9rem;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            cursor: pointer;
            transition: opacity 0.3s;
            text-decoration: none;
            display: inline-block;
        }

        button:hover,
        .btn:hover {
            opacity: 0.9;
        }

        button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .btn-secondary {
            background: transparent;
            color: var(--power);
            border: 1px solid var(--power);
        }

        .tabs {
            display: flex;
            gap: 1rem;
            margin-bottom: 2rem;
            border-bottom: 1px solid var(--border);
        }

        .tab {
            padding: 1rem 2rem;
            background: transparent;
            border: none;
            color: var(--accent-light);
            font-family: inherit;
            font-size: 0.9rem;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            cursor: pointer;
            border-bottom: 2px solid transparent;
            transition: all 0.3s;
        }

        .tab.active {
            color: var(--power);
            border-bottom-color: var(--power);
        }

        .tab-content {
            display: none;
        }

        .tab-content.active {
            display: block;
        }

        .dashboard-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 2rem;
            margin-bottom: 2rem;
        }

        .panel {
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid var(--border);
            padding: 2rem;
        }

        .panel h2 {
            font-size: 1.5rem;
            font-weight: 400;
            margin-bottom: 1.5rem;
            letter-spacing: 0.1em;
            text-transform: uppercase;
        }

        .form-group {
            margin-bottom: 1.5rem;
        }

        label {
            display: block;
            font-size: 0.8rem;
            color: var(--accent-light);
            text-transform: uppercase;
            letter-spacing: 0.1em;
            margin-bottom: 0.5rem;
        }

        input,
        select,
        textarea {
            width: 100%;
            padding: 0.75rem;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--accent);
            color: var(--power);
            font-family: inherit;
            font-size: 1rem;
        }

        input:focus,
        select:focus,
        textarea:focus {
            outline: none;
            border-color: var(--power);
        }

        textarea {
            min-height: 300px;
            resize: vertical;
        }

        .articles-list,
        .users-list {
            margin-top: 2rem;
            max-height: 600px;
            overflow-y: auto;
        }

        .article-item,
        .user-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 1rem;
            border-bottom: 1px solid var(--border);
            transition: background 0.3s;
        }

        .article-item:hover,
        .user-item:hover {
            background: rgba(255, 255, 255, 0.02);
        }

        .article-info h3,
        .user-info h3 {
            font-size: 1.1rem;
            font-weight: 400;
            margin-bottom: 0.5rem;
        }

        .article-meta,
        .user-meta {
            font-size: 0.8rem;
            color: var(--accent-light);
            text-transform: uppercase;
            letter-spacing: 0.1em;
        }

        .article-actions,
        .user-actions {
            display: flex;
            gap: 0.5rem;
        }

        .btn-small {
            padding: 0.5rem 1rem;
            font-size: 0.8rem;
        }

        .btn-danger {
            background: #cc0000;
            color: var(--power);
        }

        .message {
            padding: 1rem;
            margin-bottom: 1rem;
            border: 1px solid;
            text-align: center;
            letter-spacing: 0.1em;
        }

        .message-success {
            background: rgba(0, 200, 0, 0.1);
            border-color: #00c800;
            color: #00c800;
        }

        .message-error {
            background: rgba(200, 0, 0, 0.1);
            border-color: #cc0000;
            color: #cc0000;
        }

        .badge {
            display: inline-block;
            padding: 0.25rem 0.5rem;
            font-size: 0.7rem;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            margin-left: 0.5rem;
        }

        .badge-featured {
            background: rgba(0, 200, 0, 0.2);
            color: #00c800;
        }

        .badge-live {
            background: rgba(204, 0, 0, 0.2);
            color: #cc0000;
        }

        .badge-role {
            background: rgba(255, 255, 255, 0.1);
            color: var(--power);
        }

        .homepage-controls {
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        .homepage-item {
            padding: 1rem;
            border: 1px solid var(--border);
            background: rgba(255, 255, 255, 0.02);
        }

        .homepage-item h4 {
            margin-bottom: 0.5rem;
        }

        .workflow-step {
            padding: 1rem;
            margin-bottom: 1rem;
            border: 1px solid var(--border);
            background: rgba(255, 255, 255, 0.02);
        }

        .workflow-step h4 {
            margin-bottom: 0.5rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .step-status {
            display: inline-block;
            padding: 0.25rem 0.5rem;
            font-size: 0.7rem;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            margin-left: 0.5rem;
        }

        .step-status.pending {
            background: rgba(255, 255, 255, 0.1);
            color: var(--accent-light);
        }

        .step-status.running {
            background: rgba(0, 200, 255, 0.2);
            color: #00c8ff;
        }

        .step-status.completed {
            background: rgba(0, 200, 0, 0.2);
            color: #00c800;
        }

        .step-status.error {
            background: rgba(204, 0, 0, 0.2);
            color: #cc0000;
        }

        .spinner {
            display: inline-block;
            width: 12px;
            height: 12px;
            border: 2px solid var(--accent-light);
            border-top-color: var(--power);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .progress-bar {
            width: 100%;
            height: 8px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 4px;
            overflow: hidden;
            margin-top: 0.5rem;
        }

        .progress-fill {
            height: 100%;
            background: var(--power);
            transition: width 0.3s;
        }

        @media (max-width: 968px) {
            .dashboard-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>

<body>
    <canvas id="matrix"></canvas>

    <div class="container">
        <div class="header">
            <h1>Tableau de bord</h1>
            <div class="header-actions">
                <div class="user-info" id="userInfo"></div>
                <a href="../index.html" class="btn btn-secondary">Retour au site</a>
                <button onclick="logout()" class="btn btn-secondary">Déconnexion</button>
            </div>
        </div>

        <div id="messageContainer"></div>

        <div class="tabs">
            <button class="tab active" onclick="switchTab('articles')">Articles</button>
            <button class="tab" onclick="switchTab('homepage')">Page d'accueil</button>
            <button class="tab" id="usersTabBtn" onclick="switchTab('users')"
                style="display: none;">Utilisateurs</button>
            <button class="tab" onclick="switchTab('workflow')">Workflow</button>
        </div>

        <!-- Onglet Articles -->
        <div id="articlesTab" class="tab-content active">
            <div class="dashboard-grid">
                <div class="panel">
                    <h2>Nouvel article</h2>
                    <form id="articleForm">
                        <div class="form-group">
                            <label for="title">Titre *</label>
                            <input type="text" id="title" name="title" required>
                        </div>

                        <div class="form-group">
                            <label for="category">Catégorie *</label>
                            <select id="category" name="category" required>
                                <option value="">Sélectionner...</option>
                                <option value="Business">Business</option>
                                <option value="Technology">Technology</option>
                                <option value="Politics">Politics</option>
                                <option value="Culture">Culture</option>
                                <option value="Science">Science</option>
                                <option value="Latest">Latest</option>
                            </select>
                        </div>

                        <div class="form-group">
                            <label for="subcategory">Sous-catégorie</label>
                            <input type="text" id="subcategory" name="subcategory"
                                placeholder="ex: AI, Markets, Art...">
                        </div>

                        <div class="form-group">
                            <label for="author">Auteur *</label>
                            <input type="text" id="author" name="author" required>
                        </div>

                        <div class="form-group">
                            <label style="display: flex; align-items: center; gap: 0.5rem; cursor: pointer;">
                                <input type="checkbox" id="featured" name="featured" style="width: auto; margin: 0;">
                                <span>Mettre en vedette</span>
                            </label>
                        </div>

                        <div class="form-group">
                            <label style="display: flex; align-items: center; gap: 0.5rem; cursor: pointer;">
                                <input type="checkbox" id="live" name="live" style="width: auto; margin: 0;">
                                <span>Live</span>
                            </label>
                        </div>

                        <div class="form-group">
                            <label style="display: flex; align-items: center; gap: 0.5rem; cursor: pointer;">
                                <input type="checkbox" id="published" name="published" checked
                                    style="width: auto; margin: 0;">
                                <span>Publier immédiatement</span>
                            </label>
                        </div>

                        <div class="form-group">
                            <label style="display: flex; align-items: center; gap: 0.5rem; cursor: pointer;">
                                <input type="checkbox" id="on_homepage" name="on_homepage"
                                    style="width: auto; margin: 0;">
                                <span>Afficher sur la page d'accueil (Latest)</span>
                            </label>
                        </div>

                        <div class="form-group">
                            <label for="content">Contenu *</label>
                            <textarea id="content" name="content" required
                                placeholder="Écrivez votre article ici..."></textarea>
                        </div>

                        <button type="submit" class="btn" id="submitBtn">Publier l'article</button>
                        <button type="button" class="btn btn-secondary" id="cancelBtn"
                            style="display: none; margin-left: 1rem;" onclick="cancelEdit()">Annuler</button>
                    </form>
                </div>

                <div class="panel">
                    <h2>Articles publiés</h2>
                    <div class="articles-list" id="articlesList">
                        <p style="color: var(--accent-light); text-align: center; padding: 2rem;">
                            Chargement...
                        </p>
                    </div>
                </div>
            </div>
        </div>

        <!-- Onglet Page d'accueil -->
        <div id="homepageTab" class="tab-content">
            <div class="panel">
                <h2>Gestion de la page d'accueil</h2>
                <div class="homepage-controls" id="homepageControls">
                    <p style="color: var(--accent-light); text-align: center; padding: 2rem;">
                        Chargement...
                    </p>
                </div>
            </div>
        </div>

        <!-- Onglet Utilisateurs -->
        <div id="usersTab" class="tab-content">
            <div class="panel">
                <h2>Gestion des utilisateurs</h2>
                <div class="users-list" id="usersList">
                    <p style="color: var(--accent-light); text-align: center; padding: 2rem;">
                        Chargement...
                    </p>
                </div>
            </div>
        </div>

        <!-- Onglet Workflow -->
        <div id="workflowTab" class="tab-content">
            <div class="dashboard-grid">
                <div class="panel">
                    <h2>Configuration du Workflow</h2>
                    <form id="workflowForm">
                        <div class="form-group">
                            <label>Catégories à traiter *</label>
                            <div style="display: flex; flex-direction: column; gap: 0.5rem; margin-top: 0.5rem;">
                                <label style="display: flex; align-items: center; gap: 0.5rem; cursor: pointer; font-weight: normal;">
                                    <input type="checkbox" name="categories" value="Technology" checked style="width: auto; margin: 0;">
                                    <span>Technology</span>
                                </label>
                                <label style="display: flex; align-items: center; gap: 0.5rem; cursor: pointer; font-weight: normal;">
                                    <input type="checkbox" name="categories" value="Business" checked style="width: auto; margin: 0;">
                                    <span>Business</span>
                                </label>
                                <label style="display: flex; align-items: center; gap: 0.5rem; cursor: pointer; font-weight: normal;">
                                    <input type="checkbox" name="categories" value="Politics" checked style="width: auto; margin: 0;">
                                    <span>Politics</span>
                                </label>
                                <label style="display: flex; align-items: center; gap: 0.5rem; cursor: pointer; font-weight: normal;">
                                    <input type="checkbox" name="categories" value="Culture" checked style="width: auto; margin: 0;">
                                    <span>Culture</span>
                                </label>
                                <label style="display: flex; align-items: center; gap: 0.5rem; cursor: pointer; font-weight: normal;">
                                    <input type="checkbox" name="categories" value="Science" checked style="width: auto; margin: 0;">
                                    <span>Science</span>
                                </label>
                            </div>
                        </div>

                        <div class="form-group">
                            <label for="crawlingHours">Crawling - Heures à remonter</label>
                            <input type="number" id="crawlingHours" name="crawlingHours" value="48" min="1" max="168">
                        </div>

                        <div class="form-group">
                            <label for="maxContent">Crawling - Max articles par requête</label>
                            <input type="number" id="maxContent" name="maxContent" value="20" min="1" max="100">
                        </div>

                        <div class="form-group">
                            <label style="display: flex; align-items: center; gap: 0.5rem; cursor: pointer;">
                                <input type="checkbox" id="fetchContent" name="fetchContent" checked style="width: auto; margin: 0;">
                                <span>Récupérer le contenu complet</span>
                            </label>
                        </div>

                        <div class="form-group">
                            <label for="ollamaModel">Génération - Modèle Ollama</label>
                            <select id="ollamaModel" name="ollamaModel">
                                <option value="">Auto-détection</option>
                                <option value="ministral-3:3b">ministral-3:3b</option>
                                <option value="ministral-3:14b">ministral-3:14b</option>
                            </select>
                        </div>

                        <div class="form-group">
                            <label for="sourceLimit">Génération - Nombre d'articles sources</label>
                            <input type="number" id="sourceLimit" name="sourceLimit" value="5" min="1" max="20">
                        </div>

                        <div class="form-group">
                            <label style="display: flex; align-items: center; gap: 0.5rem; cursor: pointer;">
                                <input type="checkbox" id="autoPublish" name="autoPublish" checked style="width: auto; margin: 0;">
                                <span>Publier automatiquement</span>
                            </label>
                        </div>

                        <div class="form-group">
                            <label style="display: flex; align-items: center; gap: 0.5rem; cursor: pointer;">
                                <input type="checkbox" id="forceRepublish" name="forceRepublish" style="width: auto; margin: 0;">
                                <span>Forcer la republication</span>
                            </label>
                        </div>

                        <button type="submit" class="btn" id="launchWorkflowBtn">Lancer le workflow</button>
                        <button type="button" class="btn btn-danger" id="stopWorkflowBtn" style="display: none; margin-left: 1rem;" onclick="stopWorkflow()">Arrêter</button>
                    </form>
                </div>

                <div class="panel">
                    <h2>Suivi du Workflow</h2>
                    <div id="workflowStatus">
                        <p style="color: var(--accent-light); text-align: center; padding: 2rem;">
                            Aucun workflow en cours
                        </p>
                    </div>
                </div>
            </div>

            <div class="panel" style="margin-top: 2rem;">
                <h2>Logs en temps réel</h2>
                <div id="workflowLogs" style="background: rgba(0, 0, 0, 0.3); padding: 1rem; max-height: 400px; overflow-y: auto; font-family: monospace; font-size: 0.85rem; border: 1px solid var(--border);">
                    <p style="color: var(--accent-light);">En attente...</p>
                </div>
            </div>
        </div>
    </div>

    <!-- Firebase (Analytics) -->
    <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-analytics-compat.js"></script>
    <script src="../js/firebase-config.js"></script>
    <script src="api.js"></script>
    <script src="dashboard.js"></script>
</body>

</html>
