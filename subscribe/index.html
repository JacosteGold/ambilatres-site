<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Subscribe - AMBILATRES | Global News</title>
    <link href="https://fonts.googleapis.com/css2?family=Darker+Grotesque:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="icon" type="image/png" href="../homepage/Dubreuil services (1).png">
    <style>
        :root {
            --void: #080808;
            --power: #ffffff;
            --accent: #333333;
            --accent-light: #666666;
            --border: rgba(255, 255, 255, 0.1);
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Darker Grotesque', sans-serif;
            background: var(--void);
            color: var(--power);
            min-height: 100vh;
            overflow-x: hidden;
        }
        canvas#matrix {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            opacity: 0.07;
            pointer-events: none;
            filter: blur(0.5px);
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 1.5rem;
            position: relative;
            z-index: 1;
        }
        header {
            border-bottom: 1px solid var(--accent);
            background: rgba(8, 8, 8, 0.8);
            backdrop-filter: blur(10px);
            position: sticky;
            top: 0;
            z-index: 100;
        }
        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0.5rem 0;
            border-bottom: 1px solid var(--border);
            font-size: 0.8rem;
            letter-spacing: 0.1em;
            color: var(--accent-light);
        }
        .top-bar a {
            color: var(--accent-light);
            text-decoration: none;
            margin-left: 1rem;
            transition: color 0.3s;
        }
        .top-bar a:hover { color: var(--power); }
        .main-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 1rem 0;
        }
        .logo {
            font-size: 2rem;
            font-weight: 300;
            letter-spacing: 0.3em;
            text-decoration: none;
            color: var(--power);
            text-transform: uppercase;
        }
        nav {
            display: flex;
            gap: 1.5rem;
        }
        nav a {
            color: var(--power);
            text-decoration: none;
            font-size: 1rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            position: relative;
        }
        nav a::after {
            content: '';
            position: absolute;
            bottom: -5px;
            left: 0;
            width: 0;
            height: 1px;
            background: var(--power);
            transition: width 0.3s;
        }
        nav a:hover::after { width: 100%; }
        .content {
            padding: 2rem 0;
            min-height: 60vh;
            max-width: 600px;
        }
        .page-title {
            font-size: 2.5rem;
            font-weight: 300;
            margin-bottom: 1rem;
            letter-spacing: 0.1em;
            text-transform: uppercase;
        }
        .page-subtitle {
            color: var(--accent-light);
            font-size: 1rem;
            margin-bottom: 2rem;
            letter-spacing: 0.1em;
        }
        .form-group {
            margin-bottom: 1.5rem;
        }
        label {
            display: block;
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            margin-bottom: 0.5rem;
            color: var(--accent-light);
        }
        input[type="email"],
        input[type="text"] {
            width: 100%;
            padding: 0.75rem;
            background: transparent;
            border: 1px solid var(--border);
            border-bottom: 2px solid var(--accent);
            color: var(--power);
            font-family: inherit;
            font-size: 0.95rem;
            transition: border-color 0.3s;
        }
        input[type="email"]:focus,
        input[type="text"]:focus {
            outline: none;
            border-bottom-color: var(--power);
        }
        .checkbox-group {
            display: flex;
            flex-direction: column;
            gap: 0.75rem;
        }
        .checkbox-item {
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }
        input[type="checkbox"] {
            width: 18px;
            height: 18px;
            cursor: pointer;
            accent-color: var(--power);
        }
        .checkbox-item label {
            margin: 0;
            cursor: pointer;
            font-size: 0.85rem;
            color: var(--accent-light);
        }
        button {
            background: var(--power);
            color: var(--void);
            border: none;
            padding: 0.75rem 2rem;
            font-family: inherit;
            font-size: 0.8rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.2em;
            cursor: pointer;
            margin-top: 1rem;
            transition: all 0.3s;
        }
        button:hover {
            background: var(--accent-light);
        }
        footer {
            border-top: 1px solid var(--accent);
            padding: 3rem 0;
            background: rgba(8, 8, 8, 0.9);
            position: relative;
            z-index: 10;
            margin-top: 4rem;
        }
        .footer-content {
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
        }
        .footer-links a {
            color: var(--accent-light);
            text-decoration: none;
            margin-right: 1.5rem;
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            transition: color 0.3s;
        }
        .footer-links a:hover { color: var(--power); }
        .coords {
            font-size: 0.7rem;
            color: var(--accent);
            font-family: monospace;
        }
        @media (max-width: 768px) {
            .main-header { flex-direction: column; gap: 1rem; }
            nav { flex-wrap: wrap; justify-content: center; gap: 1rem; }
            .page-title { font-size: 1.8rem; }
        }
    </style>
</head>
<body>
    <canvas id="matrix"></canvas>
    <header>
        <div class="container">
            <div class="top-bar">
                <div class="date">Saturday, November 29, 2025</div>
                <div class="top-links">
                    <a href="index.html">Subscribe</a>
                    <a href="../login/loginpage.html">Login</a>
                </div>
            </div>
            <div class="main-header">
                <a href="../homepage/homepage.html" class="logo">AMBILATRES</a>
                <nav>
                    <a href="../latest/index.html">Latest</a>
                    <a href="../business/index.html">Business</a>
                    <a href="../technology/index.html">Technology</a>
                    <a href="../politics/index.html">Politics</a>
                    <a href="../culture/index.html">Culture</a>
                    <a href="../science/index.html">Science</a>
                </nav>
            </div>
        </div>
    </header>

    <div class="container">
        <section class="content">
            <h1 class="page-title">Subscribe</h1>
            <p class="page-subtitle">Stay informed with AMBILATRES news delivered to your inbox</p>
            
            <form>
                <div class="form-group">
                    <label for="name">Full Name</label>
                    <input type="text" id="name" name="name" required placeholder="Your Name">
                </div>

                <div class="form-group">
                    <label for="email">Email Address</label>
                    <input type="email" id="email" name="email" required placeholder="your.email@example.com">
                </div>

                <div class="form-group">
                    <label>Select Your Interests</label>
                    <div class="checkbox-group">
                        <div class="checkbox-item">
                            <input type="checkbox" id="latest" name="interests" value="latest">
                            <label for="latest">Latest News</label>
                        </div>
                        <div class="checkbox-item">
                            <input type="checkbox" id="business" name="interests" value="business">
                            <label for="business">Business & Markets</label>
                        </div>
                        <div class="checkbox-item">
                            <input type="checkbox" id="technology" name="interests" value="technology">
                            <label for="technology">Technology & Innovation</label>
                        </div>
                        <div class="checkbox-item">
                            <input type="checkbox" id="politics" name="interests" value="politics">
                            <label for="politics">Politics & Government</label>
                        </div>
                        <div class="checkbox-item">
                            <input type="checkbox" id="culture" name="interests" value="culture">
                            <label for="culture">Culture & Lifestyle</label>
                        </div>
                        <div class="checkbox-item">
                            <input type="checkbox" id="science" name="interests" value="science">
                            <label for="science">Science & Discovery</label>
                        </div>
                    </div>
                </div>

                <div class="checkbox-item">
                    <input type="checkbox" id="terms" name="terms" required>
                    <label for="terms">I agree to receive news and updates from AMBILATRES</label>
                </div>

                <button type="submit">Subscribe Now</button>
            </form>
        </section>
    </div>

    <footer>
        <div class="container">
            <div class="footer-content">
                <div class="footer-links">
                    <a href="../about/index.html">About Us</a>
                    <a href="../privacy/index.html">Privacy Policy</a>
                    <a href="../terms/index.html">Terms</a>
                    <a href="mailto:contact@ambilatres.com">Contact</a>
                </div>
                <div class="coords">22°17'56"N 114°10'20"E</div>
            </div>
        </div>
    </footer>

    <script>
        const canvas = document.getElementById('matrix');
        const ctx = canvas.getContext('2d');
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
        const chars = '杜脱脱喜欢小咪咪';
        const fontSize = 14;
        const columns = canvas.width / fontSize;
        const drops = new Array(Math.floor(columns)).fill(1);
        function draw() {
            ctx.fillStyle = 'rgba(8, 8, 8, 0.05)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = '#222';
            ctx.font = `${fontSize}px "PingFang SC", "Microsoft YaHei", monospace`;
            for (let i = 0; i < drops.length; i++) {
                const text = chars[Math.floor(Math.random() * chars.length)];
                ctx.fillText(text, i * fontSize, drops[i] * fontSize);
                if (drops[i] * fontSize > canvas.height && Math.random() > 0.95)
                    drops[i] = 0;
                drops[i]++;
            }
        }
        setInterval(draw, 25);
        window.addEventListener('resize', () => {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        });
    </script>
</body>
</html>
